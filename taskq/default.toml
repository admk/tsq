# taskq reads configuration in this order:
# 1. Built-in defaults from this file.
# 2. $XDG_CONFIG_HOME/tq/config.toml, when XDG_CONFIG_HOME is set.
# 3. The nearest .tq/config.toml in the current directory or a parent.
# Later files override earlier settings. Passing -rc FILE reads only FILE.

# Default backend. Supported values are:
# - "tmux": taskq-managed tmux sessions and broker.
# - "ts": Task Spooler.
# - "dummy": no-op backend used mainly for tests.
backend = "tmux"

# Default queue. Select another queue with `tq -Q NAME ...`.
# Queues isolate state and may override most resolved settings.
queue = "default"

# Total queue capacity. Use an integer, or "auto" to use the number of GPUs
# reported by nvidia-smi. If nvidia-smi is unavailable, "auto" resolves to 1.
slots = "auto"

# Shared backend socket name. For tmux this is passed as `tmux -L socket`;
# for Task Spooler this becomes /tmp/ts-{socket}.sock unless TS_SOCKET is set
# in [env].
socket = "taskq"

# Default resource request for newly added jobs. CLI flags override these:
# `tq add -G GPUS -N SLOTS ...`.
[alloc]

# GPUs required per job. Set to 0 for CPU-only jobs by default.
gpus = 0

# Queue slots required per job.
slots = 1

# Autonomous optimization campaigns. `tq explore` is supported only by the
# tmux backend. Every `max_*` setting accepts 0 to disable that cap.
[explore]
# Non-table options here are inherited by every phase. A value in an
# [explore.<phase>] table overrides the common value for that phase.
# Agent argv. Exactly one standalone `{}` item is replaced with the prompt.
command = ["codex", "exec", "--ephemeral", "{}"]
# Default maximum runtime in seconds for one phase job.
timeout = 1800
# Used after a planner or reviewer returns an invalid structured response.
response_repair_prompt = '''
$original_prompt

Your previous response was invalid: $error.
Return the required TASKQ_JSON line and no trailing text.
'''

# Generate distinct optimization directions without modifying the repository.
[explore.planning]
command = ["codex", "exec", "--ephemeral", "--sandbox", "read-only", "{}"]
prompt = '''
Plan $direction_count distinct optimization work direction(s).

Objective:
$objective

Relevant memory:
$memory

Previously tried directions:
$tried_directions

Additional context:
$context

Configured change scope: $change_scope.

Rules:
- Do not edit the repository; propose bounded work only.
- Keep each direction small, focused, and reviewable.
- Prioritize directions that can execute concurrently: minimize overlap in files, assumptions, resources, and dependencies on other directions in this batch.
- Use prior evidence and make every direction structurally distinct from recorded successes, failures, and the other proposed directions.
- Do not ask the user questions; make the best safe assumption.
- Return exactly $direction_count direction(s).
- End with one single-line JSON object in this exact shape: TASKQ_JSON: {"directions":[{"title":"...","hypothesis":"...","approach":"...","success_signal":"...","different_from":["..."]}]}
  - title: a short human-readable label for the direction.
  - hypothesis: a falsifiable explanation of why this direction should improve the objective.
  - approach: the concrete, bounded implementation strategy to try.
  - success_signal: the observable check, metric, or evidence that would support the hypothesis.
  - different_from: brief labels for prior or sibling approaches this direction is structurally different from; use an empty list only when there is no meaningful comparator.
'''

# Create and adjust candidate changes in isolated worktrees.
[explore.optimization]
command = ["codex", "exec", "--ephemeral", "--sandbox", "workspace-write", "{}"]
prompt = '''
Implement one small optimization attempt in the current worktree.

Objective:
$objective

Direction:
$direction

Relevant memory:
$memory

Artifacts and evidence:
$artifacts

Additional context:
$context

Configured hard change cap: $change_scope.

Rules:
- Work only in the current worktree and leave the repository in a reviewable state.
- Keep the action focused and reviewable, including when the configured cap is unlimited.
- Change implementation code only; do not modify tests, benchmarks, evaluators, fixtures, campaign state, or validation inputs.
- Do not run configured validation or GPU workloads; the dedicated validation phase evaluates the resulting commit.
- If the exact approach is blocked, make the safest useful bounded progress and explain the evidence in your final response.
'''
adjust_prompt = '''
Improve the existing attempt according to the review evidence.

Objective:
$objective

Direction:
$direction

Relevant memory:
$memory

Artifacts and evidence:
$artifacts

Additional context:
$context

Configured hard change cap: $change_scope.

Rules:
- Work only in the current worktree and leave the repository in a reviewable state.
- Keep the action focused and reviewable, including when the configured cap is unlimited.
- Change implementation code only; do not modify tests, benchmarks, evaluators, fixtures, campaign state, or validation inputs.
- Do not run configured validation or GPU workloads; the dedicated validation phase evaluates the resulting commit.
- If the exact approach is blocked, make the safest useful bounded progress and explain the evidence in your final response.
'''
# Maximum simultaneously active attempts, additionally limited by queue slots.
parallel = 4
# Maximum reviewer-requested adjustment rounds per attempt.
max_adjustments = 3
# Hard acceptance caps for distinct files and added plus removed lines.
max_files = 0
max_lines = 300
# Repository-relative fnmatch patterns that candidates may not modify.
protected = [
    ".tq/**",
    "test/**",
    "tests/**",
    "benchmark/**",
    "benchmarks/**",
]

# Independently review every completed optimization attempt.
[explore.inspection]
command = ["codex", "exec", "--ephemeral", "--sandbox", "workspace-write", "{}"]
prompt = '''
Independently inspect the completed optimization action.

Objective:
$objective

Direction:
$direction

Relevant memory:
$memory

Artifacts and evidence:
$artifacts

Additional context:
$context

Configured hard change cap: $change_scope.

Rules:
- Treat worker claims as untrusted; base the decision on the diff, Git state, logs, and trusted evaluator artifacts.
- Never accept changes that alter protected inputs, fail a required check, miss a required score threshold, or exceed an enabled change cap.
- Choose exactly one decision: accept, adjust, abandon, or stop. Use adjust only for a promising bounded follow-up.
- Do not ask the user questions and do not edit the repository.
- Any next direction must be distinct from recorded directions.
- End with one single-line JSON object in this exact shape: TASKQ_JSON: {"decision":"adjust","reason":"...","evidence":["artifact-id"],"memory_updates":[],"next_direction":null}
  - decision: exactly one decision name below:
    - accept: the candidate is useful and all hard gates permit integration.
    - adjust: the candidate is promising and one bounded follow-up mutation could fix it.
    - abandon: the approach is invalid, unhelpful, unsafe, or not worth another attempt.
    - stop: the campaign should stop exploring and drain accepted work.
  - reason: a concise justification grounded in inspected evidence.
  - evidence: identifiers or short references to the artifacts supporting the decision.
  - memory_updates: durable lessons for later directions, as strings or objects with a claim field.
  - next_direction: null unless proposing a structurally distinct follow-up direction object.
'''

# Run trusted acceptance gates in disposable exact-commit worktrees.
[explore.validation]
# GPUs allocated to each baseline or candidate validation job.
gpus = 0
# Every command must exit zero. Strings are split into argv without a shell.
checks = []
# Optional score command; its final non-empty stdout line must be finite.
# score = "python benchmarks/run.py"
# Required with score: "min" accepts lower values and "max" higher values.
# score_direction = "min"
# Required absolute improvement in the score's own units.
min_improvement = 0.0

# Serialize accepted attempts through rebase, review, and merge.
[explore.merge]
review_prompt = '''
Independently inspect the rebased optimization before integration.

Objective:
$objective

Direction:
$direction

Relevant memory:
$memory

Artifacts and evidence:
$artifacts

Additional context:
$context

Configured hard change cap: $change_scope.

Rules:
- Treat worker claims as untrusted; base the decision on the diff, Git state, logs, and trusted evaluator artifacts.
- Never accept changes that alter protected inputs, fail a required check, miss a required score threshold, or exceed an enabled change cap.
- Choose exactly one decision: accept, adjust, abandon, or stop.
- Do not ask the user questions and do not edit the repository.
- End with one single-line JSON object in this exact shape: TASKQ_JSON: {"decision":"accept","reason":"...","evidence":["artifact-id"],"memory_updates":[],"next_direction":null}
  - decision: exactly one decision name from the list above, choose from:
    - accept: the rebased candidate remains useful, correct, and permitted by every hard gate.
    - adjust: the candidate remains promising but needs another bounded mutation before it can be integrated.
    - abandon: the candidate became invalid, unsafe, unhelpful, or not worth further work.
    - stop: reject this integration and stop the campaign after draining already accepted work.
  - reason: a concise justification grounded in the rebased diff and trusted evidence.
  - evidence: identifiers or short references to the artifacts supporting the decision.
  - memory_updates: durable lessons for later directions, as strings or objects with a claim field.
  - next_direction: null unless proposing a structurally distinct follow-up direction object.
'''
rebase_prompt = '''
Resolve the in-progress rebase in the current attempt worktree.

Objective:
$objective

Direction:
$direction

Relevant memory:
$memory

Artifacts and evidence:
$artifacts

Additional context:
$context

Configured change scope: $change_scope.

Rules:
- Treat the latest campaign mainline as the parent whose behavior has highest priority.
- First preserve the parent behavior without regressions or reversals; only then preserve as much of the accepted optimization behavior as remains compatible.
- Inspect Git status and resolve only the current conflicts. Do not create a merge commit or introduce unrelated changes.
- Complete the rebase only when both priorities can be satisfied safely.
- If the optimization cannot be integrated without changing parent behavior, abort the rebase and clearly explain the incompatibility and abandonment reason in the final response.
- Do not weaken tests, benchmarks, evaluators, fixtures, or campaign state.
- Do not ask the user questions; make the safest resolution supported by the repository and artifacts.
'''
# Maximum attempts incorporated into the campaign mainline.
max_accepted_attempts = 0

# Reconcile asynchronous state and supervise the campaign controller.
[explore.controller]
# Campaign scheduling deadline in seconds from start.
max_wall_time = 28800
# Seconds between durable reconciliation passes.
interval = 5
# Heartbeat age in seconds before the tmux broker restarts the controller.
heartbeat_timeout = 30

# Environment variables added to backend commands and jobs. Keys must be valid
# shell variable names to be exported into tmux job wrappers. For tmux jobs, the
# enqueue-time shell environment is also captured and wins over duplicate keys.
[env]
# OMP_NUM_THREADS = "1"
# CUDA_DEVICE_ORDER = "PCI_BUS_ID"

# Per-queue overrides. A queue table is merged after the selected backend table.
# Useful queue keys include slots, socket, visible_gpus, alloc, env,
# history_limit, broker_interval, and gpu_free_perc.
#
# Note: backend and queue selection happens before queue overrides are merged,
# so a queue table should not be used to choose the active backend or queue.
[queues.default]
# The default queue intentionally has no overrides.
#
# Example:
# [queues.gpu]
# slots = 4
# visible_gpus = "0,1"
#
# [queues.gpu.alloc]
# gpus = 1
# slots = 1

# Backend-specific defaults. The table matching `backend` is merged into the
# top-level configuration before the active queue table is merged.
[backends.tmux]

# tmux executable name or absolute path.
command = "tmux"

# tmux scrollback history limit for taskq tmux server and job panes.
history_limit = 100000

# Broker polling interval in seconds. May be an integer or float.
broker_interval = 1

# A GPU is considered free when memory.free is greater than this percentage of
# memory.total according to nvidia-smi.
gpu_free_perc = 90

# Optional explicit GPU allowlist for the tmux broker. If unset, taskq uses
# TS_VISIBLE_DEVICES from [env] or the process environment when present.
# visible_gpus = "0,1"

[backends.ts]

# Task Spooler executable name or absolute path. The ts backend also uses the
# common slots, socket, alloc, and env settings. It sets TS_SLOTS from slots and
# TS_SOCKET from socket unless those variables are already present in [env].
command = "ts"
