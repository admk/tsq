# taskq reads configuration in this order:
# 1. Built-in defaults from this file.
# 2. $XDG_CONFIG_HOME/tq/config.toml, when XDG_CONFIG_HOME is set.
# 3. The nearest .tq/config.toml in the current directory or a parent.
# Later files override earlier settings. Passing -rc FILE reads only FILE.

# Default backend. Supported values are:
# - "tmux": taskq-managed tmux sessions and broker.
# - "ts": Task Spooler.
# - "dummy": no-op backend used mainly for tests.
backend = "tmux"

# Default queue. Select another queue with `tq -Q NAME ...`.
# Queues isolate state and may override most resolved settings.
queue = "default"

# Total queue capacity. Use an integer, or "auto" to use the number of GPUs
# reported by nvidia-smi. If nvidia-smi is unavailable, "auto" resolves to 1.
slots = "auto"

# Shared backend socket name. For tmux this is passed as `tmux -L socket`;
# for Task Spooler this becomes /tmp/ts-{socket}.sock unless TS_SOCKET is set
# in [env].
socket = "taskq"

# Default resource request for newly added jobs. CLI flags override these:
# `tq add -G GPUS -N SLOTS ...`.
[alloc]

# GPUs required per job. Set to 0 for CPU-only jobs by default.
gpus = 0

# Queue slots required per job.
slots = 1

# Autonomous optimization campaigns. `tq explore` is supported only by the
# tmux backend. Every `max_*` setting accepts 0 to disable that cap.
[explore]
# Non-table options here are inherited by every phase. A value in an
# [explore.<phase>] table overrides the common value for that phase.
# Agent argv. Exactly one standalone `{}` item is replaced with the prompt.
command = ["codex", "exec", "--ephemeral", "{}"]
# Default maximum runtime in seconds for one phase job.
timeout = 1800
# Used after a planner or reviewer returns an invalid structured response.
response_repair_prompt = "response-repair.md"

[explore.initialization]
# Synchronous setup agent used only when creating a profile.
command = ["codex", "exec", "--ephemeral", "--sandbox", "workspace-write", "{}"]
timeout = 600
prompt = "initialization.md"
repair_prompt = "initialization-repair.md"

# Generate distinct optimization directions without modifying the repository.
[explore.planning]
command = ["codex", "exec", "--ephemeral", "--sandbox", "read-only", "{}"]
prompt = "planning.md"

# Create and adjust candidate changes in isolated worktrees.
[explore.optimization]
command = ["codex", "exec", "--ephemeral", "--sandbox", "workspace-write", "{}"]
prompt = "optimization.md"
adjust_prompt = "adjustment.md"
# Maximum simultaneously active attempts, additionally limited by queue slots.
parallel = 4
# Maximum reviewer-requested adjustment rounds per attempt.
max_adjustments = 3
# Hard acceptance caps for distinct files and added plus removed lines.
max_files = 0
max_lines = 300
# Repository-relative fnmatch patterns that candidates may not modify.
protected = [
    ".tq/**",
    "test/**",
    "tests/**",
    "benchmark/**",
    "benchmarks/**",
]

# Independently review every completed optimization attempt.
[explore.inspection]
command = ["codex", "exec", "--ephemeral", "--sandbox", "workspace-write", "{}"]
prompt = "inspection.md"

# Run trusted acceptance gates in disposable exact-commit worktrees.
[explore.validation]
# GPUs allocated to each baseline or candidate validation job.
gpus = 0
# Every command must exit zero. Strings are split into argv without a shell.
checks = []
# Optional score command; its final non-empty stdout line must be finite.
# score = "python benchmarks/run.py"
# Required with score: "min" accepts lower values and "max" higher values.
# score_direction = "min"
# Required absolute improvement in the score's own units.
min_improvement = 0.0

# Serialize accepted attempts through rebase, review, and merge.
[explore.merge]
review_prompt = "merge-review.md"
rebase_prompt = "rebase.md"
# Maximum attempts incorporated into the campaign mainline.
max_accepted_attempts = 0

# Reconcile asynchronous state and supervise the campaign controller.
[explore.controller]
# Campaign scheduling deadline in seconds from start.
max_wall_time = 28800
# Seconds between durable reconciliation passes.
interval = 5
# Heartbeat age in seconds before the tmux broker restarts the controller.
heartbeat_timeout = 30

# Environment variables added to backend commands and jobs. Keys must be valid
# shell variable names to be exported into tmux job wrappers. For tmux jobs, the
# enqueue-time shell environment is also captured and wins over duplicate keys.
[env]
# OMP_NUM_THREADS = "1"
# CUDA_DEVICE_ORDER = "PCI_BUS_ID"

# Per-queue overrides. A queue table is merged after the selected backend table.
# Useful queue keys include slots, socket, visible_gpus, alloc, env,
# history_limit, broker_interval, and gpu_free_perc.
#
# Note: backend and queue selection happens before queue overrides are merged,
# so a queue table should not be used to choose the active backend or queue.
[queues.default]
# The default queue intentionally has no overrides.
#
# Example:
# [queues.gpu]
# slots = 4
# visible_gpus = "0,1"
#
# [queues.gpu.alloc]
# gpus = 1
# slots = 1

# Backend-specific defaults. The table matching `backend` is merged into the
# top-level configuration before the active queue table is merged.
[backends.tmux]

# tmux executable name or absolute path.
command = "tmux"

# tmux scrollback history limit for taskq tmux server and job panes.
history_limit = 100000

# Broker polling interval in seconds. May be an integer or float.
broker_interval = 1

# A GPU is considered free when memory.free is greater than this percentage of
# memory.total according to nvidia-smi.
gpu_free_perc = 90

# Optional explicit GPU allowlist for the tmux broker. If unset, taskq uses
# TS_VISIBLE_DEVICES from [env] or the process environment when present.
# visible_gpus = "0,1"

[backends.ts]

# Task Spooler executable name or absolute path. The ts backend also uses the
# common slots, socket, alloc, and env settings. It sets TS_SLOTS from slots and
# TS_SOCKET from socket unless those variables are already present in [env].
command = "ts"
